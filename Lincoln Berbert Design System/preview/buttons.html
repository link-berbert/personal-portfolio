<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card card--pad-l">
<style>.btn{font-family:'Geist',sans-serif;font-size:14px;padding:12px 20px;border:1px solid currentColor;background:transparent;color:#111110;cursor:pointer;letter-spacing:-.005em;transition:all .14s cubic-bezier(0.2,.6,.2,1)}
.btn:hover{background:#111110;color:#F4F2EE}
.btn.primary{background:#111110;color:#F4F2EE;border-color:#111110}.btn.primary:hover{background:#3F3E3B;border-color:#3F3E3B}
.btn.ghost{border-color:#D9D5CC}.btn.ghost:hover{border-color:#111110;background:transparent;color:#111110}
.btn.accent{background:transparent;color:#D84B20;border-color:#D84B20}.btn.accent:hover{background:#D84B20;color:#F4F2EE}
.btn.sm{padding:8px 14px;font-size:13px}
</style>
<div class="tiny">Buttons — hard corners, hairline border, type-first</div>
<div style="margin-top:14px;display:flex;gap:12px;flex-wrap:wrap">
  <button class="btn primary">Read the manifesto</button>
  <button class="btn">Selected work →</button>
  <button class="btn ghost">Ghost</button>
  <button class="btn accent">Accent (rare)</button>
  <button class="btn sm">Small</button>
</div>
<div class="tiny dim" style="margin-top:16px">No shadows. No radius. No scale-on-click.</div>
</div></body></html>
