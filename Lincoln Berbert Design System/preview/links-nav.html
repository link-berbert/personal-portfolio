<!doctype html><html><head><meta charset="utf-8"><title>Links & nav</title><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card card--pad-l">
<style>.link{position:relative;display:inline-block;font-family:'Geist',sans-serif;font-size:16px}.link::first-letter{transition:color .14s}.link:hover::first-letter{color:#D84B20}
.navi{position:relative;display:inline-block;padding-bottom:3px;font-family:'Geist',sans-serif;font-size:16px}.navi::after{content:"";position:absolute;left:0;bottom:0;height:1px;width:0;background:currentColor;transition:width .28s cubic-bezier(0.2,.6,.2,1)}.navi:hover::after,.navi.on::after{width:100%}
</style>
<div class="tiny">Link — first letter turns vermillion on hover</div>
<div style="margin-top:10px;display:flex;gap:28px"><a href="#" class="link">Selected work ↗</a><a href="#" class="link" style="color:#D84B20">Selected work ↗</a></div>
<div class="tiny" style="margin-top:20px">Nav item — rule grows 0 → 100% on hover · aria-current sticks</div>
<div style="margin-top:10px;display:flex;gap:28px"><a href="#" class="navi">Index</a><a href="#" class="navi on">Work</a><a href="#" class="navi">Writing</a><a href="#" class="navi">About</a></div>
</div></body></html>
