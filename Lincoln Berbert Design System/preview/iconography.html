<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card card--pad-l">
<div class="tiny">Iconography — typographic first · Lucide for UI · no emoji</div>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-top:14px;font-family:'Geist',sans-serif">
  <div style="text-align:center"><div style="font-size:28px">↗</div><div class="tiny" style="margin-top:6px">external</div></div>
  <div style="text-align:center"><div style="font-size:28px">→</div><div class="tiny" style="margin-top:6px">next</div></div>
  <div style="text-align:center"><div style="font-size:28px">·</div><div class="tiny" style="margin-top:6px">sep</div></div>
  <div style="text-align:center"><div style="font-family:'Newsreader',serif;font-size:26px">§</div><div class="tiny" style="margin-top:6px">section</div></div>
  <div style="text-align:center"><div style="font-family:'Newsreader',serif;font-size:22px;font-style:italic">II</div><div class="tiny" style="margin-top:6px">roman num.</div></div>
  <div style="text-align:center"><div style="font-size:24px">—</div><div class="tiny" style="margin-top:6px">em dash</div></div>
</div>
<div class="tiny" style="margin-top:18px">Lucide (1.5px stroke) — UI affordances only</div>
<div style="display:flex;gap:22px;margin-top:10px;color:#111110">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
</div>
</div></body></html>
