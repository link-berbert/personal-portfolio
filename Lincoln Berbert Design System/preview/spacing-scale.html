<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card card--pad-l">
<style>.sp{display:grid;grid-template-columns:56px 1fr auto;align-items:center;gap:12px;padding:4px 0}.bar{background:#111110;height:10px}.l{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:#6E6B65}.v{font-family:'Geist Mono',monospace;font-size:10.5px;color:#A8A49A}</style>
<div class="sp"><div class="l">s-1</div><div class="bar" style="width:4px"></div><div class="v">4 px</div></div>
<div class="sp"><div class="l">s-2</div><div class="bar" style="width:8px"></div><div class="v">8 px</div></div>
<div class="sp"><div class="l">s-3</div><div class="bar" style="width:12px"></div><div class="v">12 px</div></div>
<div class="sp"><div class="l">s-4</div><div class="bar" style="width:16px"></div><div class="v">16 px</div></div>
<div class="sp"><div class="l">s-5</div><div class="bar" style="width:24px"></div><div class="v">24 px</div></div>
<div class="sp"><div class="l">s-6</div><div class="bar" style="width:32px"></div><div class="v">32 px</div></div>
<div class="sp"><div class="l">s-7</div><div class="bar" style="width:48px"></div><div class="v">48 px</div></div>
<div class="sp"><div class="l">s-8</div><div class="bar" style="width:64px"></div><div class="v">64 px</div></div>
<div class="sp"><div class="l">s-9</div><div class="bar" style="width:96px"></div><div class="v">96 px</div></div>
<div class="sp"><div class="l">s-10</div><div class="bar" style="width:160px"></div><div class="v">160 px</div></div>
<div class="sp"><div class="l">s-11</div><div class="bar" style="width:240px"></div><div class="v">240 px</div></div>
</div></body></html>
