<!doctype html><html><head><meta charset="utf-8"><title>Radii & rules</title><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card card--pad-l">
<div class="tiny">Radii — mostly hard corners. Only three values.</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:16px">
  <div><div style="width:72px;height:72px;background:#EBE8E2;border:1px solid #D9D5CC;border-radius:0"></div><div class="tiny" style="margin-top:8px">r-0 · 0px</div><div class="tiny dim">default · cards, frames</div></div>
  <div><div style="width:72px;height:72px;background:#EBE8E2;border:1px solid #D9D5CC;border-radius:2px"></div><div class="tiny" style="margin-top:8px">r-1 · 2px</div><div class="tiny dim">inputs, controls</div></div>
  <div><div style="width:72px;height:72px;background:#EBE8E2;border:1px solid #D9D5CC;border-radius:9999px"></div><div class="tiny" style="margin-top:8px">r-full</div><div class="tiny dim">scroll indicator only</div></div>
</div>
<div class="tiny" style="margin-top:22px">Rules — depth comes from type and whitespace, not elevation.</div>
<div style="margin-top:10px"><hr style="border-top:1px solid #D9D5CC"><div class="tiny dim" style="margin-top:6px">1px · rule · #D9D5CC</div></div>
<div style="margin-top:14px"><hr style="border-top:1px solid #6E6B65"><div class="tiny dim" style="margin-top:6px">1px · rule-strong · #6E6B65</div></div>
</div></body></html>
