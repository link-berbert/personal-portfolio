<!doctype html><html><head><meta charset="utf-8"><title>Palette — Emphasis (monochrome)</title><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card card--pad-l">
  <div class="tiny">No chromatic accent. Emphasis is pure ink.</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px">
    <div><div class="swatch" style="background:#111110;height:120px"></div><div class="tiny" style="margin-top:10px">Ink · primary</div><div class="tiny dim">#111110 · fg-primary</div></div>
    <div><div class="swatch" style="background:#FBFAF7;height:120px;border:1px solid #D9D5CC"></div><div class="tiny" style="margin-top:10px">Paper · canvas</div><div class="tiny dim">#FBFAF7 / #F4F2EE</div></div>
    <div><div class="swatch" style="background:#6E6B65;height:120px"></div><div class="tiny" style="margin-top:10px">Graphite · secondary</div><div class="tiny dim">#6E6B65 · fg-secondary</div></div>
  </div>
  <div class="tiny dim" style="margin-top:16px">Emphasis = type scale + weight + whitespace. Not hue.</div>
</div></body></html>
